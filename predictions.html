<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقع المباريات - كأس العالم 2026</title>
    <link rel="stylesheet" href="style.css"> <!-- تأكد أن ملف الستايل بنفس المجلد -->
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .match-card { background: #1e1e1e; border-radius: 12px; padding: 20px; margin: 15px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; }
        .team { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .team img { width: 50px; height: 35px; border-radius: 4px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .versus { font-weight: bold; color: #ffcc00; font-size: 1.2rem; padding: 0 10px; }
        .score-input { width: 60px; padding: 8px; font-size: 1.2rem; text-align: center; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; margin-top: 5px; }
        .match-info { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: 0.3s; margin-top: 10px; font-weight: bold;}
        .btn-save:hover { background: #219150; }
        .btn-save:disabled { background: #555; color: #888; cursor: not-allowed; }
        .locked-msg { color: #e74c3c; font-size: 0.9rem; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔮 توقع مباريات كأس العالم 2026</h1>
        <p>ملاحظة: يقفل التوقع تلقائياً قبل انطلاق المباراة بـ 5 دقائق!</p>
        
        <div id="matches-list">
            <!-- المباريات بتنزل هنا تلقائياً بالجافاسكريبت -->
        </div>
    </div>

    <!-- استدعاء ملف جدول المباريات الثابت من الجيت هب -->
    <script src="matches.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const listContainer = document.getElementById("matches-list");
            
            if (typeof matches === 'undefined' || matches.length === 0) {
                listContainer.innerHTML = "<p>⚠️ لم يتم العثور على جدول المباريات، تأكد من وجود ملف matches.js</p>";
                return;
            }

            // قراءة التوقعات المحفوظة مسبقاً بجهاز المستخدم
            const savedPredictions = JSON.parse(localStorage.getItem("user_predictions")) || {};

            matches.forEach(match => {
                const isOpen = isPredictionOpen(match.matchTime);
                const matchDate = new Date(match.matchTime).toLocaleString('ar-SA', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'numeric' });
                
                // جلب التوقع القديم إن وجد
                const pred = savedPredictions[match.id] || { home: "", away: "" };

                const card = document.createElement("div");
                card.className = "match-card";
                card.innerHTML = `
                    <div class="team">
                        <img src="https://flagcdn.com/w80/${match.team1Code}.png" alt="${match.team1}">
                        <span>${match.team1}</span>
                        <input type="number" min="0" class="score-input" id="home-${match.id}" value="${pred.home}" ${!isOpen ? 'disabled' : ''}>
                    </div>
                    
                    <div class="versus">
                        VS
                        <div class="match-info">${matchDate}</div>
                        ${!isOpen ? '<div class="locked-msg">🔒 انتهى الوقت</div>' : ''}
                    </div>
                    
                    <div class="team">
                        <img src="https://flagcdn.com/w80/${match.team2Code}.png" alt="${match.team2}">
                        <span>${match.team2}</span>
                        <input type="number" min="0" class="score-input" id="away-${match.id}" value="${pred.away}" ${!isOpen ? 'disabled' : ''}>
                    </div>
                `;

                if (isOpen) {
                    const saveBtn = document.createElement("button");
                    saveBtn.className = "btn-save";
                    saveBtn.innerText = "حفظ التوقع 💾";
                    saveBtn.onclick = () => saveMatchPrediction(match.id);
                    card.appendChild(saveBtn);
                }

                listContainer.appendChild(card);
            });
        });

        // دالة حفظ التوقع في ذاكرة الجهاز المحلية
        function saveMatchPrediction(matchId) {
            const homeScore = document.getElementById(`home-${matchId}`).value;
            const awayScore = document.getElementById(`away-${matchId}`).value;

            if (homeScore === "" || awayScore === "") {
                alert("الرجاء إدخال الأهداف أولاً!");
                return;
            }

            // جلب القائمة الكاملة وتحديثها
            const allPredictions = JSON.parse(localStorage.getItem("user_predictions")) || {};
            allPredictions[matchId] = {
                home: homeScore,
                away: awayScore
            };

            localStorage.setItem("user_predictions", JSON.stringify(allPredictions));
            alert("🎯 تم حفظ توقعك بنجاح في جهازك!");
        }
    </script>
</body>
</html>
